services:
  - type: web
    name: vidyaloop-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DB_NAME
        value: vidyaloop
      - key: JWT_EXPIRY_HOURS
        value: 24
      - key: REPORT_OUTPUT_DIR
        value: ./reports
      - key: RATE_LIMIT_REQUESTS
        value: 120
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: UPLOAD_MAX_BYTES
        value: 5242880
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
